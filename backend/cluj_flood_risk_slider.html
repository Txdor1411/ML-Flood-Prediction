  <div style="font-size: 13px; margin-bottom: 6px; color: #212529;">Rainfall simulation</div>
  <input id="rainSlider" type="range" min="0" max="200" step="10" value="100" style="width: 230px;"/>
  <div style="margin-top: 4px; font-size: 12px; color: #495057;">Rainfall: <b id="rainValue">100%</b></div>
</div>

  function setScenario(step) {

  });
